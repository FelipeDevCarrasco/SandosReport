<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandos Report - Ventas Shipit</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Sandos Report</h1>
            <p class="subtitle">Ventas de Shipit (canal Sphinx)</p>
        </header>

        <main>
            <div class="ventas-toolbar">
                <input type="text" id="searchInput" placeholder="Buscar por referencia, destinatario..." class="search-input">
                <button class="btn-refresh" id="btnRefresh">↻ Actualizar</button>
                <button class="btn-excel" id="btnExcel">Generar reporte en excel</button>
                <div id="reportProgress" class="report-progress" aria-hidden="true">
                    <div class="report-progress-bar"></div>
                    <span class="report-progress-text">Generando reporte...</span>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="ventas-table">
                    <thead>
                        <tr>
                            <th>Estado</th>
                            <th>ID Venta</th>
                            <th>Fecha Creación</th>
                            <th>Vendedor</th>
                            <th>Destinatario</th>
                            <th>Courier</th>
                            <th>Dirección</th>
                            <th>Comuna</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="ventasBody">
                        <tr class="loading-row">
                            <td colspan="9">Cargando ventas...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="message-container" id="messageContainer"></div>
        </main>
    </div>

    <div id="modalDetalle" class="modal-overlay" aria-hidden="true">
        <div class="modal">
            <div class="modal-header">
                <h2>Detalle - <span id="modalTitulo"></span></h2>
                <button type="button" class="modal-close" id="modalClose" aria-label="Cerrar">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modalLoading" class="modal-loading">Cargando detalle...</div>
                <div id="modalContent" class="modal-content" style="display: none;">
                    <table class="modal-table">
                        <thead>
                            <tr>
                                <th>Doc</th>
                                <th>Cantidad</th>
                                <th>N producto</th>
                                <th>SKU</th>
                            </tr>
                        </thead>
                        <tbody id="modalTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
